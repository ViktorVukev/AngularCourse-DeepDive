<form (ngSumbit)="onSubmit(ticket.value, textInput.value)">
    <app-control label="Title">
        <input name="title" id="title" #ticket />
    </app-control>
    <app-control label="Request">
        <textarea name="request" id="request" rows="3" #textInput></textarea>
    </app-control>
    <p>
        <button appButton>
            <span>
                Submit
            </span>
            <span ngProjectAs="icon">
                ⌲
            </span>
        </button>
    </p>
</form>
